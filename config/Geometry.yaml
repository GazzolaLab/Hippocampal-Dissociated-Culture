# 80 neurons
# 200 um electrode spacing
# 30 um electrode size
Parametric Surface:
  Origin:
    U: median
    V: median
    L: max
  Layer Extents:
    SO:  [[0.0,0.0,0.0], [100.0,100.0,100.0]]
    SP:  [[0.0,0.0,100.0],[100.0,100.0,150.0]]
    SR:  [[0.0,0.0,150.0], [100.0,100.0,350.0]]
    SLM: [[0.0, 0.0,350.0], [100.0, 100.0, 450.0]]
  Rotation: [0.0, 0.0, 0.0]
# Range of 
# Cell Constraints: # Constraint in Z-Height
#   PC:
#     SP: [100., 120.] # Lee, ..., Soltesz. Neuron 2014
#   PVBC:
#     SR: [150., 200.0] # Booker, Vida. Cell & Tissue Research 2018
Cell Distribution:
  STIM:
    SO:  1
    SP:  0
    SR:  0
    SLM: 0
  PYR:
    SO:  80
    SP:  0
    SR:  0
    SLM: 0
  PVBC: #5530
    SO:  35
    SP:  0
    SR:  0
    SLM: 0
  OLM: #1640
    SO:  44
    SP:  0
    SR:  0
    SLM: 0
